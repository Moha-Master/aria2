name: manual-build-release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: master
    - name: Linux setup
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++-12 \
          autoconf \
          automake \
          autotools-dev \
          autopoint \
          libtool \
          pkg-config \
          libssl-dev \
          libc-ares-dev \
          zlib1g-dev \
          libsqlite3-dev \
          libssh2-1-dev
        echo 'CC=gcc-12' >> "$GITHUB_ENV"
        echo 'CXX=g++-12' >> "$GITHUB_ENV"
    - name: macOS setup
      if: runner.os == 'macOS'
      run: |
        brew install gettext openssl libssh2 c-ares sqlite3 autoconf automake pkg-config libtool
        echo 'CC=clang' >> "$GITHUB_ENV"
        echo 'CXX=clang++' >> "$GITHUB_ENV"
    - name: Build native aria2
      run: |
        autoreconf -i
        if [ "$RUNNER_OS" = "Linux" ]; then
          ./configure --without-gnutls --with-openssl
        else
          ./configure --without-openssl --without-gnutls --with-appletls --disable-nls
        fi
        make -j"$(nproc 2> /dev/null || sysctl -n hw.ncpu)"
    - name: Package native artifact
      shell: bash
      run: |
        mkdir -p out
        if [ "$RUNNER_OS" = "Linux" ]; then
          cp src/aria2c out/aria2c-linux-x86_64
          tar -czf out/aria2c-linux-x86_64.tar.gz -C out aria2c-linux-x86_64
        else
          cp src/aria2c out/aria2c-macos-arm64
          tar -czf out/aria2c-macos-arm64.tar.gz -C out aria2c-macos-arm64
        fi
    - name: Upload native artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-${{ runner.os }}
        path: out/*.tar.gz

  build-windows:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
      with:
        ref: master
    - name: Build Windows binary via Docker
      run: |
        docker build -f Dockerfile.mingw \
          --build-arg HOST=x86_64-w64-mingw32 \
          --build-arg ARIA2_VERSION=master \
          --build-arg ARIA2_REF=refs/heads/master \
          -t aria2-mingw .
        cid="$(docker create aria2-mingw)"
        docker cp "$cid:/aria2/src/aria2c.exe" ./aria2c-windows-x86_64.exe
        docker rm "$cid"
        zip -j aria2c-windows-x86_64.zip aria2c-windows-x86_64.exe
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-windows
        path: aria2c-windows-x86_64.zip

  build-android:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
      with:
        ref: master
    - name: Build Android binary via Docker
      run: |
        docker build -f Dockerfile.android --build-arg ARIA2_VERSION=master -t aria2-android .
        cid="$(docker create aria2-android)"
        docker cp "$cid:/root/build/aria2/src/aria2c" ./aria2c-android-aarch64
        docker rm "$cid"
        tar -czf aria2c-android-aarch64.tar.gz aria2c-android-aarch64
    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-android
        path: aria2c-android-aarch64.tar.gz

  release:
    needs: [build-native, build-windows, build-android]
    runs-on: ubuntu-22.04
    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true
    - name: Generate release date
      id: meta
      run: |
        release_date="$(date -u '+%y.%-m.%-d')"
        suffix="$(printf '%s' "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date -u +%s%N)" | sha256sum | cut -c1-6)"
        release_name="${release_date}-${suffix}"
        echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
    - name: Publish GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.meta.outputs.release_name }}
        name: ${{ steps.meta.outputs.release_name }}
        artifacts: "dist/*"
        generateReleaseNotes: true
